<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      margin: 0;
      color: #333;
      font-size: 18px;
    }
    
    .status {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
    }
    
    .status.active {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.inactive {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .toggle-section {
      text-align: center;
      margin: 15px 0;
    }
    
    .toggle-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    
    .toggle-btn:hover {
      background: #0056b3;
    }
    
    .toggle-btn.active {
      background: #dc3545;
    }
    
    .toggle-btn.active:hover {
      background: #c82333;
    }
    
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }
    
    .color-legend {
      margin: 15px 0;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 5px;
      border: 1px solid #e9ecef;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      margin: 8px 0;
      font-size: 12px;
    }
    
    .color-box {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      margin-right: 10px;
      border: 1px solid #ddd;
    }
    
    .color-box.green {
      background: #008000;
    }
    
    .color-box.orange {
      background: #FF7518;
    }
    
    .color-box.black {
      background: #000000;
    }
    
    .stats {
      margin-top: 15px;
      padding: 10px;
      background: #e9ecef;
      border-radius: 5px;
    }
    
    .stats h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #333;
    }
    
    .format-count {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      font-size: 12px;
    }
    .image-list-section {
      margin-top: 20px;
      background: #f8f9fa;
      border-radius: 5px;
      padding: 10px;
      border: 1px solid #e9ecef;
      max-height: 180px;
      overflow-y: auto;
    }
    .image-list-section h3 {
      margin-top: 0;
      font-size: 14px;
      color: #333;
    }
    .image-list-item {
      font-size: 11px;
      color: #333;
      margin-bottom: 7px;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .image-list-url {
      flex: 1;
      text-decoration: underline;
      color: #007bff;
      cursor: pointer;
    }
    .image-list-url:hover {
      color: #0056b3;
    }
    .image-list-table {
      width: 100%;
      border-collapse: collapse;
    }
    .image-list-table th, .image-list-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    .image-list-table th {
      background-color: #f2f2f2;
      font-weight: bold;
    }
    .image-list-table tbody tr:hover {
      background-color: #e9ecef;
    }
    .download-report-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
      margin-top: 5px;
      transition: background 0.2s;
    }
    .download-report-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖼️ Image Format Detector</h1>
  </div>
  
  <div class="status" id="status-indicator">
    <span id="status-text">Cargando...</span>
  </div>
  
  <div class="toggle-section">
    <button id="toggle-button" class="toggle-btn">
      <span id="toggle-text">Activar</span>
    </button>
  </div>
  
  <div class="info">
    Esta extensión detecta automáticamente el formato de las imágenes en la página web y las marca con un borde de color junto con su formato y peso.
  </div>
  
  <div class="stats">
    <h3>📊 Estadísticas de la página</h3>
    <div id="stats-content">
      <div class="format-count">
        <span>Imágenes detectadas:</span>
        <span id="total-images">0</span>
      </div>
      <div id="format-breakdown">
        <!-- Se llenará dinámicamente -->
      </div>
    </div>
  </div>

  <div class="image-list-section">
    <h3>🖼️ Imágenes encontradas</h3>
    <button id="download-report-btn" class="download-report-btn">Descargar reporte</button>
    <table class="image-list-table">
      <thead>
        <tr>
          <th>URL</th>
          <th>Formato</th>
          <th>Peso (KB)</th>
        </tr>
      </thead>
      <tbody id="image-list">
        <!-- Se llenará dinámicamente -->
      </tbody>
    </table>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
